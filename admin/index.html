<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Dink Club — Event Editor</title>
  <!-- Netlify Identity: lets the client log in with an emailed invite (no GitHub account needed) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Decap CMS (the no-code editor UI) -->
  <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>
  <script>
    // After an Identity invite, send the user into the editor automatically.
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function (user) {
        if (!user) {
          window.netlifyIdentity.on('login', function () { document.location.href = '/admin/'; });
        }
      });
    }
  </script>
</body>
</html>
