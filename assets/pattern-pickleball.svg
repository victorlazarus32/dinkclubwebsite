<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100" viewBox="0 0 1400 1100">
  <g fill="none" stroke="#d3d9df" stroke-width="1.5" stroke-linecap="round">
    <!-- long sweeping lines, large scale -->
    <line x1="-80" y1="150" x2="1480" y2="20"/>
    <line x1="-80" y1="470" x2="1480" y2="640"/>
    <line x1="-80" y1="980" x2="1480" y2="1120"/>
    <line x1="360" y1="-80" x2="600" y2="1180"/>
    <line x1="1120" y1="-80" x2="880" y2="1180"/>
    <!-- oversized abstract arcs (cropped, off-canvas) -->
    <path d="M -120 760 Q 700 380 1520 860"/>
    <path d="M 1480 240 Q 760 560 -40 300"/>
    <!-- large thin rings, partially off the edges -->
    <circle cx="1300" cy="980" r="360"/>
    <circle cx="90" cy="120" r="240"/>
  </g>
</svg>
